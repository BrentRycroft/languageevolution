name: PR checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel queued / in-progress checks for the same PR (or branch) when a new
# push lands. Without this, rapid commits stack runs against the limited
# ubuntu-latest pool and "All GitHub-hosted runners are busy" pile-ups.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm test

      - run: npm run build
