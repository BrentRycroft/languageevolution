name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Opt into Node 24 for JS actions so the Node 20 deprecation warning
  # from actions runners doesn't break us ahead of the June 2026 cutoff.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Deploy-only pipeline. Tests live in `pr.yml` and run on every PR
  # into `main`, so anything that reaches this workflow is already
  # green. Re-running the full suite here (property tests alone take
  # ~4 minutes) was pushing deploys past 10 minutes for no safety gain.
  # If we ever need belt-and-braces post-merge coverage, add a
  # separate `main-checks.yml` that runs alongside this one.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      # `npm ci` is fast when the setup-node cache hits; the lockfile
      # hash keys the cache so a dependency bump invalidates cleanly.
      - run: npm ci

      # Typecheck + production build. Vite's build surfaces its own
      # parse / type / bundling errors, and `tsc --noEmit` catches
      # type regressions the PR check also gates — keeping it here is
      # a cheap last-mile sanity check (< 10 s).
      - run: npx tsc --noEmit

      - run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
