name: Nightly full suite

# The COMPREHENSIVE gate. RUN_SLOW=1 runs the entire surface — including
# the property, multi-thousand-generation, and divergence/calibration
# tiers that the PR `npm test` intentionally skips for speed. Those tiers
# previously ran nowhere in CI and silently rotted (stale assertions
# accumulated undetected); running them nightly catches regressions within
# a day without making every PR wait on minutes of simulation. Sharded so
# the run finishes in a few minutes per runner.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  full-suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx vitest run --shard=${{ matrix.shard }}/4
        env:
          RUN_SLOW: "1"
