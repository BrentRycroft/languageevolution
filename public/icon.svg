<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#1f232c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <g stroke="#7cc4ff" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- trunk -->
    <path d="M256 420 L256 300"/>
    <!-- first split -->
    <path d="M256 300 L170 220"/>
    <path d="M256 300 L342 220"/>
    <!-- left branch splits -->
    <path d="M170 220 L110 150"/>
    <path d="M170 220 L200 140"/>
    <!-- right branch splits -->
    <path d="M342 220 L312 140"/>
    <path d="M342 220 L402 150"/>
  </g>
  <g fill="#ffcc66">
    <circle cx="110" cy="150" r="14"/>
    <circle cx="200" cy="140" r="14"/>
    <circle cx="312" cy="140" r="14"/>
    <circle cx="402" cy="150" r="14"/>
  </g>
  <circle cx="256" cy="300" r="10" fill="#7cc4ff"/>
  <circle cx="170" cy="220" r="9" fill="#7cc4ff"/>
  <circle cx="342" cy="220" r="9" fill="#7cc4ff"/>
  <circle cx="256" cy="420" r="12" fill="#e6e8ee"/>
</svg>
